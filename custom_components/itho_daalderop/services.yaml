boost_boiler:
  name: Boost Boiler
  description: Activeer boost mode voor snelle opwarming van de boiler
  target:
    device:
      integration: itho_daalderop
  fields:
    activate:
      name: Activeren
      description: True om boost te activeren, False om te deactiveren
      required: false
      default: true
      selector:
        boolean:

set_schedule:
  name: Instellen Klokprogramma
  description: Stel een klokprogramma in voor automatische temperatuurregeling per dag en tijd
  target:
    device:
      integration: itho_daalderop
  fields:
    schedule:
      name: Schema
      description: >
        Schema object met dag:uur:temperatuur mappings.
        Bijvoorbeeld: {"0": {"0": 10, "8": 60, "17": 65}, "1": {"0": 10}}
        waarbij 0-6 = ma-zo, uur = 0-23, temperatuur in °C
      required: true
      example: '{"0": {"0": 10, "8": 60, "17": 65}, "1": {"0": 10, "8": 60, "17": 65}}'
      selector:
        object:
